
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Трансляции</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      padding: 24px 16px;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tab {
      padding: 10px 24px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #ccc;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      user-select: none;
    }

    .tab:hover {
      background: #252525;
      border-color: #555;
      color: #fff;
    }

    .tab.active {
      background: #6c5ce7;
      border-color: #6c5ce7;
      color: #fff;
    }

    .player-wrapper {
      width: 100%;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
    }

    .player-wrapper .embed {
      display: none;
    }

    .player-wrapper .embed.active {
      display: block;
    }

    @media (max-width: 600px) {
      .container { padding: 12px 8px; }
      .tab { padding: 8px 16px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="tabs" id="tabs">
      <button class="tab active" data-idx="0">Главная сцена</button>
      <button class="tab" data-idx="1">Digital Learning</button>
      <button class="tab" data-idx="2">Smart Ranking</button>
    </div>
    <div class="player-wrapper" id="player">
      <div class="embed active" style="position: relative; padding-top: 91.37%;"><iframe src="https://kinescope.dev/embed/0cz5nn3gZqadNpumXEL4S5" allow="autoplay; fullscreen; picture-in-picture; encrypted-media; gyroscope; accelerometer; clipboard-write; screen-wake-lock;" frameborder="0" allowfullscreen style="position: absolute; width: 100%; height: 100%; top: 0; left: 0;"></iframe></div>
      <div class="embed" style="position: relative; padding-top: 56.25%;"><iframe src="https://kinescope.dev/embed/0cz5nq9651ozupqTkezdsY" allow="autoplay; fullscreen; picture-in-picture; encrypted-media; gyroscope; accelerometer; clipboard-write; screen-wake-lock;" frameborder="0" allowfullscreen style="position: absolute; width: 100%; height: 100%; top: 0; left: 0;"></iframe></div>
      <div class="embed" style="position: relative; padding-top: 56.25%;"><iframe src="https://kinescope.dev/embed/0cz5nqTY2TtKiq5XXphRq1" allow="autoplay; fullscreen; picture-in-picture; encrypted-media; gyroscope; accelerometer; clipboard-write; screen-wake-lock;" frameborder="0" allowfullscreen style="position: absolute; width: 100%; height: 100%; top: 0; left: 0;"></iframe></div>
    </div>
  </div>

  <script>
    var embeds = document.querySelectorAll('#player .embed');
    document.getElementById('tabs').addEventListener('click', function(e) {
      var tab = e.target.closest('.tab');
      if (!tab) return;

      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');

      var idx = parseInt(tab.dataset.idx, 10);
      embeds.forEach(function(el, i) {
        el.classList.toggle('active', i === idx);
      });
    });
  </script>
</body>
</html>
